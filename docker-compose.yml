services:
  backend:
    build: ./apps/backend
    ports: 
      - "4000:4000"
    env_file:
      - .env
    environment: 
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
    depends_on: 
      - redis
      - postgres
    networks:
      - app-network

  frontend:
    build: ./apps/frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

  postgres:
    image: postgres:17
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7
    networks:
      - app-network


networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:

